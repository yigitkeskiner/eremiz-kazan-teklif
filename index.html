<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Erem Group kurumsal web tasarimi ve kazan teklif araci." />
    <title>Erem Group | Kurumsal Teklif Araci</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#top" aria-label="Erem Group ana sayfa">
        <img src="./logo_dark.png" alt="Erem Group" style="height:40px;display:block;" />
      </a>
      <a class="header-action" href="#teklif">Teklif Olustur</a>
    </header>

    <main id="top">

      <section id="teklif" class="section quote-section">
        <div class="quote-heading">
          <div>
            <p class="eyebrow">Teklif Araci</p>
            <h2>Kazan ve aksesuar kalemlerini profesyonel teklif ciktisina donustur.</h2>
          </div>
          <div class="rate-box">
            <label for="eurRate" id="eurRateLabel">EUR/TL (yükleniyor...)</label>
            <input id="eurRate" type="number" min="1" value="42" />
          </div>
        </div>

        <div class="quote-shell">
          <form class="config-panel" id="quoteForm">
            <fieldset>
              <legend>Musteri Bilgisi</legend>
              <label>
                Firma / Musteri
                <input id="customer" type="text" placeholder="Musteri adi" />
              </label>
              <label>
                Proje / Bina
                <input id="project" type="text" placeholder="Proje adi" />
              </label>
            </fieldset>

            <fieldset>
              <legend>Marka</legend>
              <div class="segmented" role="radiogroup" aria-label="Marka secimi">
                <button type="button" class="segment active" data-brand="ECA">E.C.A</button>
                <button type="button" class="segment" data-brand="BAYMAK">Baymak</button>
                <button type="button" class="segment" data-brand="VAILLANT">Vaillant</button>
              </div>
            </fieldset>

            <fieldset>
              <legend>Kazanlar</legend>
              <div id="boilerList" class="item-list"></div>
            </fieldset>

            <fieldset class="inline-fieldset">
              <legend>Sistem</legend>
              <label class="toggle-line">
                <input id="hasWaterTank" type="checkbox" checked />
                Boyler mevcut
              </label>
              <label>
                Boyler adedi
                <input id="waterTankCount" type="number" min="1" max="20" value="1" />
              </label>
              <label>
                Marj %
                <input id="marginRate" type="number" min="0" max="100" value="20" />
              </label>
            </fieldset>
          </form>

          <aside class="summary-panel">
            <div class="summary-header">
              <div>
                <span>Teklif Ozeti</span>
                <strong id="summaryBrand">E.C.A</strong>
              </div>
              <button id="printBtn" type="button">Yazdir</button>
            </div>

            <div class="client-card">
              <span id="summaryCustomer">Musteri adi girilmedi</span>
              <strong id="summaryProject">Proje adi girilmedi</strong>
            </div>

            <div id="quoteLines" class="quote-lines"></div>

            <div class="totals">
              <div>
                <span>Satis Toplami</span>
                <strong id="salesTotal">€ 0,00</strong>
              </div>
              <div>
                <span>TL Karsiligi</span>
                <strong id="tryTotal">₺ 0,00</strong>
              </div>
              <div>
                <span>Tahmini Kar</span>
                <strong id="profitTotal">₺ 0,00</strong>
              </div>
            </div>
          </aside>
        </div>
      </section>
    </main>



    <script src="./script.js"></script>
  </body>
</html>
